# Git hooks configuration
# Install: lefthook install
# Docs: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact
    lint:
      run: bun run lint
      stage_fixed: true
    typecheck:
      run: bun run build && bun run typecheck

pre-push:
  parallel: false
  commands:
    install:
      run: bun install
    test:
      run: bun run test:fast

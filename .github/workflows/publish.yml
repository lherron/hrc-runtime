name: Publish @lherron/agent-spaces package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install npm 11 (for trusted publisher OIDC)
        # Node 22 ships npm 10.x which predates trusted-publisher OIDC.
        # Pin to a specific version to avoid the self-upgrade flake
        # `npm install -g npm@latest` sometimes hits (missing
        # promise-retry in npm's own node_modules).
        run: |
          npm install -g npm@11.5.2
          npm --version

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build
        run: bun run clean && bun run build

      - name: Pack smoke test
        run: bun scripts/smoke-test-pack.ts
        working-directory: packages/cli

      - name: Publish @lherron/agent-spaces
        run: npm publish --access public --provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ""
